<!DOCTYPE html>
<html>

<head>
    <title>Simulation Replay</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Logistics Simulation Replay</h1>

<div id="summary"></div>

<div id="controls">
    <button id="previous">⏮ Previous</button>
    <button id="play">▶ Play</button>
    <button id="pause">⏸ Pause</button>
    <button id="next">⏭ Next</button>
</div>

<div id="world">

    <div class="location">

      <h2>Point A</h2>

      <h3>Truck Heads</h3>
      <div id="pointATrucks" class="container"></div>

      <h3>Tanks</h3>
      <div id="pointATanks" class="container"></div>

    </div>

    <div class="location">

      <h2>Road</h2>

      <h3>Truck Heads</h3>
      <div id="roadTrucks" class="container"></div>

      <h3>Tanks</h3>
      <div id="roadTanks" class="container"></div>

    </div>

    <div class="location">

      <h2>Point C</h2>

      <h3>Truck Heads</h3>
      <div id="pointCTrucks" class="container"></div>

      <h3>Tanks</h3>
      <div id="pointCTanks" class="container"></div>

    </div>
</div>

<h2>Current Event</h2>

<div id="currentEvent"></div>

<script src="parser.js"></script>
<script src="state.js"></script>
<script src="renderer.js"></script>
<script src="player.js"></script>
<script src="app.js"></script>

</body>

</html>
